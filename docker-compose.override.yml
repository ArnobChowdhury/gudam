version: "3.9"

services:
  api:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api:/app

  web:
    command: npm run dev
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next 

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  glitchtip:
    ports:
      - "8001:8000"
